name: Agent CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 mypy black isort
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Run Black
        run: |
          black --check . --line-length 100 || true
      
      - name: Run isort
        run: |
          isort --check-only --diff . || true
      
      - name: Run Flake8
        run: |
          flake8 . --max-line-length=100 --exclude=.git,__pycache__,.eggs,*.egg,build,dist --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --max-line-length=100 --exclude=.git,__pycache__,.eggs,*.egg,build,dist --count --exit-zero --max-complexity=10 --show-source --statistics
      
      - name: Run MyPy
        run: |
          mypy . --ignore-missing-imports || true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing || true
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  security:
    name: Security Check
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Run Bandit
        run: |
          bandit -r . -x ./tests -ll || true
      
      - name: Check dependencies for vulnerabilities
        run: |
          safety check || true

  code-review:
    name: Automated Code Review
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'pull_request'
    
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
      
      - name: Run Automated Code Review
        env:
          GLM5_API_KEY: ${{ secrets.GLM5_API_KEY }}
          GLM5_BASE_URL: ${{ secrets.GLM5_BASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -c "
          import asyncio
          import os
          import sys
          sys.path.insert(0, '.')
          
          from code_reviewer import get_code_reviewer
          
          async def run_review():
              reviewer = get_code_reviewer()
              pr_number = int(os.getenv('GITHUB_REF', '').split('/')[-1])
              
              result = await reviewer.review_pull_request(pr_number)
              
              if result.get('success'):
                  print(f'Code Review Score: {result[\"score\"]}/100')
                  print(f'Approved: {result[\"approved\"]}')
                  print(result['summary'])
                  
                  # 如果评分太低，设置失败
                  if result['score'] < 70:
                      sys.exit(1)
              else:
                  print(f'Review failed: {result.get(\"error\")}')
                  sys.exit(1)
          
          asyncio.run(run_review())
          " || echo "Code review check completed with warnings"

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      
      - name: Build package
        run: |
          python -m build || echo "No setup.py or pyproject.toml found"
      
      - name: Check package
        run: |
          twine check dist/* || echo "No distribution files found"

  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    if: always()
    
    steps:
      - name: Determine Status
        id: status
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" ]] || \
             [[ "${{ needs.test.result }}" == "failure" ]] || \
             [[ "${{ needs.security.result }}" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi
      
      - name: Create Status Summary
        run: |
          echo "## CI Pipeline Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Overall Status**: ${{ steps.status.outputs.status }}" >> $GITHUB_STEP_SUMMARY
      
      - name: Exit with appropriate code
        run: |
          if [[ "${{ steps.status.outputs.status }}" == "failure" ]]; then
            exit 1
          fi
